name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  AOP_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/agent_platform
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agent_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install API dependencies
        run: uv sync --dev --no-install-project

      - name: Run API tests
        run: uv run --no-sync pytest

  web-build:
    name: Web build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

  delivery-artifacts:
    name: Delivery artifacts
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - web-build
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          uv sync --dev --no-install-project
          npm ci

      - name: Build web app
        run: npm run build:web

      - name: Upload API source bundle
        uses: actions/upload-artifact@v4
        with:
          name: api-source-bundle
          path: |
            apps/api/src
            migrations
            scripts
            alembic.ini
            pyproject.toml
            uv.lock
            README.md
          if-no-files-found: error
          retention-days: 14

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-next-build
          include-hidden-files: true
          path: |
            apps/web/.next
            apps/web/package.json
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 14
