<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agent Platform Enterprise OS - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e0e3e6",
                        "on-secondary-fixed": "#001c3a",
                        "on-secondary-container": "#385782",
                        "on-primary-fixed": "#001c3a",
                        "surface-variant": "#e0e3e6",
                        "surface-bright": "#f7f9fc",
                        "primary-container": "#0075d5",
                        "on-secondary-fixed-variant": "#274871",
                        "tertiary-container": "#b95a00",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f7",
                        "on-primary-fixed-variant": "#004785",
                        "inverse-surface": "#2d3133",
                        "outline": "#707785",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#733600",
                        "on-surface": "#191c1e",
                        "surface": "#f7f9fc",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d8dadd",
                        "secondary-fixed": "#d4e3ff",
                        "on-tertiary-fixed": "#311300",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#a5c8ff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#404753",
                        "on-background": "#191c1e",
                        "secondary": "#40608b",
                        "primary-fixed": "#d4e3ff",
                        "primary": "#005daa",
                        "secondary-container": "#afceff",
                        "primary-fixed-dim": "#a5c8ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdbc7",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c0c7d6",
                        "background": "#f7f9fc",
                        "tertiary-fixed-dim": "#ffb688",
                        "on-tertiary-container": "#fffbff",
                        "tertiary": "#934600",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#a9c8f9",
                        "inverse-on-surface": "#eff1f4",
                        "surface-container": "#eceef1",
                        "surface-tint": "#005fae",
                        "on-primary-container": "#fefcff",
                        "surface-container-high": "#e6e8eb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "Noto Sans SC"],
                        "body": ["Inter", "Noto Sans SC"],
                        "label": ["Inter", "Noto Sans SC"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #f7f9fc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(45deg, #005daa, #0075d5);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Background Architectural Elements -->
<div class="fixed inset-0 -z-10 bg-surface">
<div class="absolute top-[-10%] right-[-5%] w-[40%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30%] h-[50%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
<!-- Main Login Container -->
<main class="relative w-full max-w-[1200px] grid grid-cols-1 md:grid-cols-12 bg-surface-container-lowest rounded-full shadow-[0_4px_20px_0_rgba(25,28,30,0.04),0_12px_40px_0_rgba(25,28,30,0.08)] overflow-hidden">
<!-- Left Side: Branding & Visual (Architectural Depth) -->
<div class="hidden md:flex md:col-span-7 flex-col justify-between p-12 bg-surface-container-low relative overflow-hidden">
<div class="relative z-10">
<div class="flex items-center gap-3 mb-12">
<div class="w-10 h-10 primary-gradient rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary" data-icon="architecture">architecture</span>
</div>
<span class="text-xl font-bold tracking-tight text-on-surface">Agent Platform</span>
</div>
<h1 class="text-5xl font-bold text-on-surface leading-[1.2] mb-6">
                    Precision <br/>
<span class="text-primary">Architect</span>
</h1>
<p class="text-on-surface-variant max-w-md text-lg leading-relaxed">
                    专为企业级智能体设计的运行管理平台。通过精密的架构实现高效、安全且可扩展的 AI 工作流管理。
                </p>
</div>
<!-- Abstract Visual Component -->
<div class="absolute bottom-0 right-0 w-[80%] h-[60%] translate-x-1/4 translate-y-1/4 opacity-20">
<div class="w-full h-full border-[1px] border-primary rounded-full"></div>
<div class="absolute inset-8 border-[1px] border-primary/40 rounded-full"></div>
<div class="absolute inset-20 border-[1px] border-primary/20 rounded-full"></div>
</div>
<div class="relative z-10 mt-auto">
<div class="flex gap-8">
<div>
<div class="text-2xl font-bold text-primary">99.9%</div>
<div class="text-xs font-medium text-on-surface-variant uppercase tracking-wider">系统可用性</div>
</div>
<div>
<div class="text-2xl font-bold text-primary">256-bit</div>
<div class="text-xs font-medium text-on-surface-variant uppercase tracking-wider">端到端加密</div>
</div>
</div>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="col-span-1 md:col-span-5 p-8 md:p-16 flex flex-col justify-center">
<div class="mb-10">
<h2 class="text-2xl font-bold text-on-surface mb-2">欢迎回来</h2>
<p class="text-on-surface-variant">请登录您的企业账户以继续</p>
</div>
<form class="space-y-6">
<!-- Username -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest ml-1" for="username">用户名</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="block w-full pl-12 pr-4 py-3 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="username" name="username" placeholder="请输入用户名" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest" for="password">密码</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">忘记密码?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-12 pr-4 py-3 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" name="password" placeholder="请输入密码" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 rounded text-primary border-outline-variant focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant" for="remember">在此设备上保持登录</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 primary-gradient text-on-primary font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    进入平台
                </button>
</form>
<!-- Social Login / SSO -->
<div class="mt-12">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<span class="relative px-4 text-xs font-medium text-outline bg-surface-container-lowest">或者通过第三方登录</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low border border-outline-variant/20 rounded-xl hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-on-surface text-[20px]" data-icon="group">group</span>
<span class="text-sm font-medium text-on-surface">企业微信</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low border border-outline-variant/20 rounded-xl hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-on-surface text-[20px]" data-icon="domain">domain</span>
<span class="text-sm font-medium text-on-surface">LDAP/SSO</span>
</button>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-auto pt-12 flex flex-wrap justify-center gap-6 text-[11px] font-medium text-outline uppercase tracking-wider">
<a class="hover:text-primary" href="#">服务条款</a>
<a class="hover:text-primary" href="#">隐私政策</a>
<a class="hover:text-primary" href="#">安全指南</a>
<span class="text-outline-variant">© 2024 Precision Architect</span>
</div>
</div>
</main>
<!-- Floating Decorative Assets -->
<div class="absolute top-10 left-10 opacity-40 hidden lg:block">
<div class="w-24 h-24 border-2 border-primary/10 rounded-xl rotate-12"></div>
</div>
<div class="absolute bottom-10 right-10 opacity-40 hidden lg:block">
<div class="w-32 h-32 border-2 border-secondary/10 rounded-full"></div>
</div>
</body></html>
