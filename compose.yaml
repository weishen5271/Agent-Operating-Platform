services:
  postgres:
    image: postgres:16
    container_name: agent-platform-postgres
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agent_platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent_platform_postgres_data:
